apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kiran-dev-edit-binding
  namespace: dev
subjects:
  - kind: User
    name: kiran    # must exactly match username in aws-auth
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole  #predefined
  name: edit
  apiGroup: rbac.authorization.k8s.io


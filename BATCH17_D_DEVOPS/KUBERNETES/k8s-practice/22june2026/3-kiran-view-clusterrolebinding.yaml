apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kiran-view-clusterrolebinding
subjects:
  - kind: User
    name: kiran    # must exactly match username in aws-auth
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: view    #predefiend
  apiGroup: rbac.authorization.k8s.io


apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nginx:latest
        env:
          - name: SERVICE_NAME
            value: "backend-service"
        envFrom:
          - configMapRef:
              name: app-configmap
          - secretRef:
              name: db-secret